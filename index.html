<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KEREGAMES</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    background: #1a1a1a;
}

h1 {
    color: #00ffcc;
}

/* OYUN KART */
.games {
    padding: 20px;
    text-align: center;
}

.game-card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    display: inline-block;
}

/* OYUN ALANI */
#gameScreen {
    display: none;
}

.top-bar {
    display: flex;
    justify-content: space-around;
    background: #1a1a1a;
    padding: 10px;
}

#gameArea {
    position: relative;
    width: 100%;
    height: 90vh;
}

/* KARE */
#box {
    width: 80px;
    height: 80px;
    position: absolute;
    cursor: pointer;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1>KEREGAMES</h1>
</header>

<div class="games">
    <div class="game-card" onclick="startGame()">🎮 Oyun 1</div>
</div>

<!-- OYUN -->
<div id="gameScreen">
    <div class="top-bar">
        <div>Skor: <span id="score">0</span></div>
        <div>Seviye: <span id="level">1</span></div>
    </div>

    <div id="gameArea">
        <div id="box"></div>
    </div>
</div>

<script>
let box = document.getElementById("box");
let scoreEl = document.getElementById("score");
let levelEl = document.getElementById("level");

let score = 0;
let level = 1;

/* OYUN BAŞLAT */
function startGame() {
    document.querySelector(".games").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
}

/* SES */
function playSound() {
    try {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        osc.frequency.value = 300 + level * 40;
        osc.connect(ctx.destination);
        osc.start();
        setTimeout(() => {
            osc.stop();
            ctx.close();
        }, 100);
    } catch(e){}
}

/* RENK */
function randomColor() {
    return "#" + Math.floor(Math.random()*16777215).toString(16);
}

/* HAREKET */
function moveBox() {
    let maxX = window.innerWidth - 80;
    let maxY = window.innerHeight - 80;

    box.style.left = Math.random() * maxX + "px";
    box.style.top = Math.random() * maxY + "px";
}

/* TIK */
box.onclick = function() {
    score++;
    scoreEl.textContent = score;

    if(score % 5 === 0){
        level++;
        levelEl.textContent = level;
    }

    box.style.background = randomColor();
    moveBox();
    playSound();
};

/* BAŞLANGIÇ */
window.onload = function() {
    box.style.background = randomColor();
    moveBox();
};
</script>

</body>
</html>
